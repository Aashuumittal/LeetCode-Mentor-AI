<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 16px;
      background: #121214;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      box-sizing: border-box;
    }
    .popup-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
    }
    h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(135deg, #a78bfa 0%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      margin: 0;
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.4;
    }
    .status-card {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 12px;
      margin: 4px 0;
    }
    .streak-val {
      font-size: 20px;
      font-weight: 700;
      color: #a78bfa;
      margin-bottom: 2px;
    }
    .primary-btn {
      width: 100%;
      background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
      border: none;
      border-radius: 6px;
      color: #ffffff;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      box-sizing: border-box;
      transition: filter 0.2s;
    }
    .primary-btn:hover {
      filter: brightness(1.1);
    }
  </style>
</head>
<body>
  <div class="popup-container">
    <h2>🧠 LeetCode Mentor AI</h2>
    <p>Your AI-powered DSA coach is running active on LeetCode problem pages.</p>
    
    <div class="status-card" id="status-card">
      <p id="status-text">Checking authentication...</p>
    </div>

    <a href="https://leetcode.com/problemset/" target="_blank" class="primary-btn">Go to LeetCode Problems</a>
  </div>
  <script src="utils/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
