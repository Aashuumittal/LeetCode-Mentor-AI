version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: leetcode-mentor-db
    environment:
      POSTGRES_DB: ${DB_NAME:-leetcode_mentor}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d leetcode_mentor"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: leetcode-mentor-cache
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leetcode-mentor-backend
    ports:
      - "${SERVER_PORT:-9094}:${SERVER_PORT:-9094}"
    environment:
      - SERVER_PORT=${SERVER_PORT:-9094}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-leetcode_mentor}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-dGhpcy1pcy1hLXZlcnktc2VjdXJlLWFuZC1sb25nLWp3dC1zZWNyZXQta2V5LXRoYXQtaXMtdXNlZC1mb3ItbGVldGNvZGUtbWVudG9yLWFp}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY:-900000}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY:-2592000000}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
