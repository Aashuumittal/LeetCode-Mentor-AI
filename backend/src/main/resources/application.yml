server:
  port: ${SERVER_PORT:9094}

spring:
  application:
    name: leetcode-mentor

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true

  codec:
    max-in-memory-size: 10MB

jwt:
  secret: ${JWT_SECRET:dGhpcy1pcy1hLXZlcnktc2VjdXJlLWFuZC1sb25nLWp3dC1zZWNyZXQta2V5LXRoYXQtaXMtdXNlZC1mb3ItbGVldGNvZGUtbWVudG9yLWFp}
  access-expiry: ${JWT_ACCESS_EXPIRY:900000}
  refresh-expiry: ${JWT_REFRESH_EXPIRY:2592000000}

groq:
  api:
    key: ${GROQ_API_KEY}
    url: ${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}

openrouter:
  api:
    key: ${OPENROUTER_API_KEY}
    url: ${OPENROUTER_API_URL:https://openrouter.ai/api/v1/chat/completions}

ai:
  model1: llama-3.3-70b-versatile
  model2: deepseek-r1-distill-llama-70b
  model3: deepseek/deepseek-r1

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}